<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TDX Scripting</title>

    <!-- Tab Icon (Favicon) -->
    <!-- Removed 'public/' and changed type to image/jpeg since your file is a .jpg -->
    <link rel="icon" type="image/jpeg" href="/image04.jpg">

    <!-- Social Media Embed Image -->
    <!-- Using the absolute URL ensures Discord/Twitter can always find it -->
    <meta property="og:image" content="https://raw.githubusercontent.com/tdx10-2/tdx-scripting-1-/refs/heads/main/public/embed.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter Card Embed -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/tdx10-2/tdx-scripting-1-/refs/heads/main/public/embed.png">
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
